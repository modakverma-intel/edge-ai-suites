      - name: Upload Multimodal Weld Defect Detection Sample Apps HTML test report to GitHub
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: multimodal-test-report
          path: /tmp/test_multimodal_report

      - name: Generate Test Summary
        if: ${{ !cancelled() }}
        env:
          TAG: ${{ inputs.tag || github.ref }}
          BUILD: ${{ inputs.build || 'yes' }}
          TESTS: ${{ inputs.tests || env.DEFAULT_TESTS }}
          SKIP_LONG_TESTS: ${{ inputs.skip_long_tests || 'yes' }}
        run: |
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET, os

          summary_path = os.environ['GITHUB_STEP_SUMMARY']
          tag     = os.environ.get('TAG', 'main')
          build   = os.environ.get('BUILD', 'yes')
          tests   = os.environ.get('TESTS', 'all-tests')
          skip_long = os.environ.get('SKIP_LONG_TESTS', 'yes')
          event   = os.environ.get('GITHUB_EVENT_NAME', 'unknown')
          ts_core_exit = os.environ.get('TIMESERIES_CORE_EXIT_CODE', '')
          ts_security_exit = os.environ.get('TIMESERIES_SECURITY_EXIT_CODE', '')
          mm_exit = os.environ.get('MULTIMODAL_EXIT_CODE', '')

          def fmt_time(s):
              s = float(s); m = int(s) // 60; r = s - m * 60
              return f"{m}m{r:.0f}s" if m else f"{s:.1f}s"

          def parse_junit(xml_path):
              if not os.path.exists(xml_path):
                  return None, []
              from collections import defaultdict
              root = ET.parse(xml_path).getroot()
              files = defaultdict(lambda: {'total': 0, 'passed': 0, 'failed': 0, 'skipped': 0, 'errors': 0, 'time': 0.0})
              issue_details = []
              for tc in root.findall('.//testcase'):
                  parts = tc.get('classname', '').split('.')
                  fname = next((p for p in parts if p.startswith('test_')), None)
                  # Fall back to the testcase 'name' attribute for collection errors
                  # where classname may be empty
                  if not fname:
                      raw_name = tc.get('name', parts[0] if parts else 'unknown')
                      fname = raw_name.replace('.py', '') if raw_name else 'unknown'
                  test_id = f"{fname}::{tc.get('name', 'unknown')}"
                  files[fname]['total'] += 1
                  files[fname]['time'] += float(tc.get('time', 0))
                  fail_el = tc.find('failure')
                  err_el = tc.find('error')
                  if fail_el is not None:
                      files[fname]['failed'] += 1
                      msg = fail_el.get('message', '')[:200]
                      issue_details.append(('FAIL', test_id, msg))
                  elif err_el is not None:
                      files[fname]['errors'] += 1
                      msg = err_el.get('message', '')[:200]
                      issue_details.append(('ERROR', test_id, msg))
                  elif tc.find('skipped') is not None:
                      files[fname]['skipped'] += 1
                  else:
                      files[fname]['passed'] += 1

              # Also capture testsuite-level errors (e.g. collection errors)
              # that prevented tests from running
              for ts in root.findall('.//testsuite'):
                  ts_errors = int(ts.get('errors', 0))
                  ts_tests = int(ts.get('tests', 0))
                  # If there are errors at the testsuite level but no testcases were run,
                  # report the collection/setup failure
                  if ts_errors > 0 and ts_tests == 0 and not files:
                      suite_name = ts.get('name', 'unknown')
                      files[suite_name] = {'total': ts_errors, 'passed': 0, 'failed': 0, 'skipped': 0, 'errors': ts_errors}

              return [{'name': n, **c} for n, c in sorted(files.items())], issue_details

          overall = {'total': 0, 'passed': 0, 'failed': 0, 'skipped': 0, 'errors': 0, 'time': 0.0}

          with open(summary_path, 'a') as out:
              out.write('## \U0001f4ca Test Execution Summary\n\n')

              out.write('### \U0001f50d Run Information\n')
              out.write(f'- **Event:** {event}\n')
              out.write(f'- **Tag/Branch:** {tag}\n')
              out.write(f'- **Build:** {build}\n')
              out.write(f'- **Tests:** {tests}\n')
              out.write(f'- **Skip Long Tests:** {skip_long}\n\n')

              sections = [
                  ('\U0001f30a Time Series Wind and Weld Tests', '/tmp/test_timeseries_core_report/junit.xml', ts_core_exit),
                  ('\U0001f512 Security Tests', '/tmp/test_timeseries_security_report/junit.xml', ts_security_exit),
                  ('\U0001f3ad Multimodal Tests', '/tmp/test_multimodal_report/junit.xml', mm_exit),
              ]
              for title, xml_path, exit_code in sections:
                  out.write(f'### {title}\n')
                  results, issues = parse_junit(xml_path)
                  if results is None:
                      out.write('\u23ed\ufe0f **Status:** SKIPPED (not run)\n\n')
                      continue
                  if exit_code == '0':
                      out.write('\u2705 **Status:** PASSED\n\n')
                  else:
                      out.write(f'\u274c **Status:** FAILED (Exit Code: {exit_code or "?"})\n\n')
                  out.write('| Test File | Total | Pass | Fail | Skip | Err | Time |\n')
                  out.write('|-----------|------:|-----:|-----:|-----:|----:|-----:|\n')
                  sec = {'total': 0, 'passed': 0, 'failed': 0, 'skipped': 0, 'errors': 0, 'time': 0.0}
                  for r in results:
                      out.write(f"| `{r['name']}` | {r['total']} | {r['passed']} | {r['failed']} | {r['skipped']} | {r['errors']} | {fmt_time(r['time'])} |\n")
                      for k in sec:
                          sec[k] += r[k]
                  out.write(f"| **Total** | **{sec['total']}** | **{sec['passed']}** | **{sec['failed']}** | **{sec['skipped']}** | **{sec['errors']}** | **{fmt_time(sec['time'])}** |\n\n")
                  if issues:
                      out.write('<details><summary>\u274c Failure/Error Details</summary>\n\n')
                      out.write('| Status | Test | Message |\n')
                      out.write('|--------|------|--------|\n')
                      for kind, test_id, msg in issues:
                          safe_msg = msg.replace('|', '\\|').replace('\n', ' ')
                          out.write(f'| {kind} | `{test_id}` | {safe_msg} |\n')
                      out.write('\n</details>\n\n')
                  for k in overall:
                      overall[k] += sec[k]

              out.write('### \U0001f3af Overall Summary\n')
              out.write('| Metric | Count |\n')
              out.write('|--------|------:|\n')
              out.write(f"| **Total Tests** | **{overall['total']}** |\n")
              out.write(f"| \u2705 Passed | {overall['passed']} |\n")
              out.write(f"| \u274c Failed | {overall['failed']} |\n")
              out.write(f"| \u23ed\ufe0f Skipped | {overall['skipped']} |\n")
              out.write(f"| \u26a0\ufe0f Errors | {overall['errors']} |\n")
              out.write(f"| \u23f1\ufe0f Total Duration | {fmt_time(overall['time'])} |\n\n")

              if overall['total'] > 0:
                  rate = (overall['passed'] * 100) // overall['total']
                  out.write(f'\U0001f4c8 **Success Rate:** {rate}%\n\n')
              else:
                  out.write('\U0001f4c8 **Success Rate:** N/A (No tests executed)\n\n')

              if overall['total'] == 0:
                  out.write('\U0001f50d **Overall Status:** NO TESTS EXECUTED\n')
              elif overall['failed'] == 0 and overall['errors'] == 0:
                  out.write('\u2705 **Overall Status:** ALL TESTS PASSED\n')
              else:
                  out.write('\u274c **Overall Status:** SOME TESTS FAILED\n')
          PYEOF
