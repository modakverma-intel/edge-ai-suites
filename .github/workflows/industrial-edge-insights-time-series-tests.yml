---
# SPDX-FileCopyrightText: (C) 2026 Intel Corporation
# SPDX-License-Identifier: Apache-2.0

name: "[Industrial Edge Insights Multimodal and Time Series] Functional Tests"
run-name: "[Industrial Edge Insights Multimodal and Time Series] Functional Tests workflow (by @${{ github.actor }} via ${{ github.event_name }})"

on:
  schedule:
    - cron: '0 14 * * *' # 14:00 UTC daily
  workflow_dispatch:
    inputs:
      tag:
        description: 'Branch or tag to checkout (leave empty to use main branch)'
        required: false
        type: string
        default: 'main'
      build:
        description: 'Build Docker images before running tests (yes/no)'
        required: false
        type: string
        default: 'yes'
      tests:
        description: >
          Which tests to run. Use 'all-tests', 'timeseries-all', 'timeseries-functional', or 'multimodal-all' to run a group,
          or a comma-separated list of file names or pytest node IDs for individual tests.
          File names: test_docker_deployment_stability,
          test_docker_deployment_wind_turbine, test_docker_helm_deployment_security,
          test_docker_influxdb_retention,
          test_helm_deployment_wind_turbine, test_helm_influxdb_retention,
          test_docker_deployment_multimodal, test_helm_deployment_multimodal.
          Node ID format (single function): test_docker_deployment_wind_turbine::test_make_up_mqtt.
          Leave empty to use the default set defined in DEFAULT_TESTS env variable.
        required: false
        type: string
      skip_long_tests:
        description: 'Skip long-running tests that take 1 hour or more (yes/no)'
        required: false
        type: string
        default: 'yes'
      runner_label:
        description: 'Labels for self-hosted or github hosted runners'
        required: false
        type: string
        default: 'ubuntu-24.04'
  workflow_call:
    inputs:
      tag:
        description: 'Branch or tag to checkout (leave empty to use main branch)'
        required: false
        type: string
        default: 'main'
      build:
        description: 'Build Docker images before running tests (yes/no)'
        required: false
        type: string
        default: 'yes'
      tests:
        description: >
          Which tests to run. Use 'all-tests', 'timeseries-all', 'timeseries-functional', or 'multimodal-all' to run a group,
          or a comma-separated list of file names or pytest node IDs for individual tests.
          File names: test_docker_deployment_stability,
          test_docker_deployment_wind_turbine, test_docker_helm_deployment_security,
          test_docker_influxdb_retention,
          test_helm_deployment_wind_turbine, test_helm_influxdb_retention,
          test_docker_deployment_multimodal, test_helm_deployment_multimodal.
          Node ID format (single function): test_docker_deployment_wind_turbine::test_make_up_mqtt.
          Leave empty to use the default set defined in DEFAULT_TESTS env variable.
        required: false
        type: string
      skip_long_tests:
        description: 'Skip long-running tests that take 1 hour or more (yes/no)'
        required: false
        type: string
        default: 'yes'
      runner_label:
        description: 'Labels for self-hosted or github hosted runners'
        required: false
        type: string
        default: 'ubuntu-24.04'
permissions: {}

env:
  DEFAULT_TESTS: all-tests

jobs:
  functional-tests:
    name: Functional Tests for Multimodal and TimeSeries
    runs-on: ${{ inputs.runner_label || 'ubuntu-24.04' }}
    permissions:
      contents: read
      packages: read
    steps:
      - name: Print workflow inputs
        env:
          TAG: ${{ inputs.tag || github.ref }}
          BUILD: ${{ inputs.build || 'yes' }}
          TESTS: ${{ inputs.tests || env.DEFAULT_TESTS }}
          SKIP_LONG_TESTS: ${{ inputs.skip_long_tests || 'yes' }}
        run: |
          echo "tag/ref         : $TAG"
          echo "build           : $BUILD"
          echo "tests           : $TESTS"
          echo "skip_long_tests : $SKIP_LONG_TESTS"

      - name: Checkout edge-ai-suites repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Use current repository (supports forks) and specified tag/branch or current ref
          ref: ${{ inputs.tag || github.ref }}
          persist-credentials: false

      - name: Resolve edge-ai-libraries ref
        if: ${{ inputs.build != 'no' || (inputs.tag || 'main') == 'main' }}
        env:
          REQUESTED_TAG: ${{ inputs.tag }}
        run: |
          LIBRARIES_REF="main"
          if [[ -n "$REQUESTED_TAG" ]]; then
            if git ls-remote --exit-code --heads --tags https://github.com/open-edge-platform/edge-ai-libraries.git "$REQUESTED_TAG" >/dev/null 2>&1; then
              LIBRARIES_REF="$REQUESTED_TAG"
            else
              echo "Requested edge-ai-libraries ref '$REQUESTED_TAG' was not found. Falling back to 'main'."
            fi
          fi
          echo "EDGE_AI_LIBRARIES_REF=$LIBRARIES_REF" >> "$GITHUB_ENV"

      - name: Checkout Time Series Analytics microservice (edge-ai-libraries)
        if: ${{ inputs.build != 'no' || (inputs.tag || 'main') == 'main' }}
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: open-edge-platform/edge-ai-libraries
          ref: ${{ env.EDGE_AI_LIBRARIES_REF }}
          path: edge-ai-libraries
          persist-credentials: false

      - name: Building Time Series Analytics microservices
        if: ${{ inputs.build != 'no' || (inputs.tag || 'main') == 'main' }}
        run: |
          cd ./edge-ai-libraries/microservices/time-series-analytics/docker
          docker compose down -v
          docker compose build

      - name: Building Multimodal Sample App images
        if: ${{ inputs.build != 'no' || (inputs.tag || 'main') == 'main' }}
        run: |
          cd "${{ github.workspace }}/manufacturing-ai-suite/industrial-edge-insights-multimodal/"
          make down
          make build

      - name: Generate Helm charts for Multimodal Sample App
        if: ${{ inputs.build != 'no' || (inputs.tag || 'main') == 'main' }}
        run: |
          cd "${{ github.workspace }}/manufacturing-ai-suite/industrial-edge-insights-multimodal/"
          echo "Generating Helm charts for multimodal..."
          make gen_helm_charts

      - name: Building Time Series Sample App images
        if: ${{ inputs.build != 'no' || (inputs.tag || 'main') == 'main' }}
        run: |
          cd "${{ github.workspace }}/manufacturing-ai-suite/industrial-edge-insights-time-series/"
          make down
          make build

      - name: Generate Helm charts for Time Series Sample Apps
        if: ${{ inputs.build != 'no' || (inputs.tag || 'main') == 'main' }}
        env:
          TESTS: ${{ inputs.tests || env.DEFAULT_TESTS }}
        run: |
          cd "${{ github.workspace }}/manufacturing-ai-suite/industrial-edge-insights-time-series/"

          # Determine which sample apps need helm charts based on selected tests
          # Only generate for Helm tests, not Docker tests
          WIND_HELM_TESTS="test_helm_deployment_wind_turbine test_helm_influxdb_retention test_docker_helm_deployment_security"
          WELD_HELM_TESTS=""

          GENERATE_WIND=false
          GENERATE_WELD=false

          # Parse comma-separated test input
          IFS=',' read -ra SELECTED <<< "$TESTS"
          for t in "${SELECTED[@]}"; do
            t="$(echo "$t" | xargs)"  # trim whitespace
            # Extract base test file name (strip .py suffix and anything after ::)
            # Handles: test_helm_deployment_wind_turbine, test_helm_deployment_wind_turbine.py,
            # and test_helm_deployment_wind_turbine::test_gen_chart
            test_file="${t%%::*}"
            test_file="${test_file%.py}"

            # Check if it's a wildcard selector (generate all helm charts)
            if [[ "$t" == "all-tests" || "$t" == "timeseries-all" || "$t" == "timeseries-functional" ]]; then
              GENERATE_WIND=true
              GENERATE_WELD=true
              break
            fi

            # Check if test is wind helm-related
            if echo "$WIND_HELM_TESTS" | grep -qw "$test_file"; then
              GENERATE_WIND=true
            fi

            # Check if test is weld helm-related
            if echo "$WELD_HELM_TESTS" | grep -qw "$test_file"; then
              GENERATE_WELD=true
            fi
          done

          # Generate helm charts only for the helm tests being run
          if [[ "$GENERATE_WIND" == "true" ]]; then
            echo "Generating Helm chart package for wind-turbine-anomaly-detection..."
            make gen_helm_charts_targz app=wind-turbine-anomaly-detection
          fi

          if [[ "$GENERATE_WELD" == "true" ]]; then
            echo "Generating Helm chart package for weld-defect-detection..."
            make gen_helm_charts_targz app=weld-defect-detection
          fi

          if [[ "$GENERATE_WIND" == "false" && "$GENERATE_WELD" == "false" ]]; then
            echo "No helm tests selected, skipping helm chart generation"
          fi

      - name: Install nmap
        run: |
          sudo apt-get update
          sudo apt-get install -y nmap

      - name: Install k3s
        run: |
          curl -sfL https://get.k3s.io | INSTALL_K3S_SELINUX_WARN=true INSTALL_K3S_VERSION=${K3S_VERSION} \
          sh -s - --disable=traefik --write-kubeconfig-mode=644
          echo "KUBECONFIG=/etc/rancher/k3s/k3s.yaml" >> "$GITHUB_ENV"

      - name: Load images into k3s
        if: ${{ inputs.build != 'no' || (inputs.tag || 'main') == 'main' }}
        run: |
          echo "Loading docker images into k3s..."
          docker images --format "{{.Repository}}:{{.Tag}}" | grep "^intel/ia-" | grep -v "<none>" | while read image; do
              echo "Importing image: $image"
              docker save "$image" | sudo k3s ctr images import -
          done

      - name: Cleanup cluster before Time Series Wind and Weld tests
        run: |
          echo "=== Cleaning up cluster resources before Time Series Wind and Weld tests ==="

          # Uninstall all helm releases
          echo "Uninstalling all Helm releases..."
          helm list --all-namespaces -q 2>/dev/null | while read release; do
            ns=$(helm list --all-namespaces --filter "^${release}$" -o json 2>/dev/null | jq -r '.[0].namespace // "default"')
            echo "Uninstalling helm release: $release from namespace: $ns"
            helm uninstall "$release" -n "$ns" --wait --timeout 5m 2>/dev/null || true
          done

          # Delete test-related namespaces (ts-sample-app is used by security tests)
          echo "Cleaning up test namespaces..."
          for ns in ts-sample-app weld wind timeseries; do
            if kubectl get namespace "$ns" 2>/dev/null; then
              echo "Deleting namespace: $ns"
              kubectl delete namespace "$ns" --wait=true --timeout=5m 2>/dev/null || true
            fi
          done

          # Clean up sample-app namespaces
          echo "Cleaning up namespace-scoped test resources..."
          for ns in ts-sample-app weld wind timeseries; do
            if kubectl get namespace "$ns" 2>/dev/null; then
              kubectl delete pvc --all -n "$ns" --wait=true --timeout=5m 2>/dev/null || true
              kubectl wait --for=delete pod --all -n "$ns" --timeout=5m 2>/dev/null || true
              kubectl get pods -n "$ns" -o name 2>/dev/null | while read pod; do
                kubectl delete "$pod" -n "$ns" --force --grace-period=0 2>/dev/null || true
              done
            fi
          done

          # Clean up any leftover docker resources
          echo "Cleaning up docker resources..."
          cd "${{ github.workspace }}/manufacturing-ai-suite/industrial-edge-insights-time-series/"
          make down 2>/dev/null || true

          # Give cluster time to stabilize
          echo "Waiting for cluster to stabilize..."
          sleep 30

          # Verify cluster is healthy
          echo "Verifying cluster health..."
          kubectl get nodes
          kubectl get pods -A
          echo "=== Time Series Wind and Weld cleanup complete ==="

      - name: Run Time Series Wind and Weld functional tests
        env:
          TESTS: ${{ inputs.tests || env.DEFAULT_TESTS }}
          SKIP_LONG_TESTS: ${{ inputs.skip_long_tests || 'yes' }}
        run: |
          # Core time-series test files excluding security.
          TIMESERIES_CORE_TESTS="test_docker_deployment_stability \
            test_docker_deployment_wind_turbine test_docker_influxdb_retention \
            test_helm_deployment_wind_turbine \
            test_helm_influxdb_retention"

          # Skip if only multimodal tests are selected
          # Parse comma-separated input, trim whitespace from each entry
          IFS=',' read -ra SELECTED <<< "$TESTS"
          SELECTED_TESTS=()
          for t in "${SELECTED[@]}"; do
            t="$(echo "$t" | xargs)"
            [[ -n "$t" ]] && SELECTED_TESTS+=("$t")
          done

          # Determine which core time-series test files to run.
          # Supports file names (test_foo), file names with .py, and node IDs (test_foo::test_bar)
          TS_CORE_TEST_FILES=()
          RUN_ALL_TS=false
          for t in "${SELECTED_TESTS[@]}"; do
            if [[ "$t" == "all-tests" || "$t" == "timeseries-all" || "$t" == "timeseries-functional" ]]; then
              RUN_ALL_TS=true; break
            fi
            # Extract base file name (strip .py suffix and anything after ::)
            file_part="${t%%::*}"
            file_part="${file_part%.py}"
            if echo "$TIMESERIES_CORE_TESTS" | grep -qw "$file_part"; then
              if [[ "$t" == *"::"* ]]; then
                TS_CORE_TEST_FILES+=("${file_part}.py::${t#*::}")
              else
                TS_CORE_TEST_FILES+=("${file_part}.py")
              fi
            fi
          done

          if [[ "$RUN_ALL_TS" == "false" && "${#TS_CORE_TEST_FILES[@]}" -eq 0 ]]; then
            echo "Skipping time-series core tests (no wind/weld tests selected)"
            exit 0
          fi

          cd "${{ github.workspace }}/manufacturing-ai-suite/industrial-edge-insights-time-series/tests/functional"
          echo "Running Time Series Wind and Weld functional tests"
          python3 -m venv env
          source env/bin/activate
          pip3 install -r ../requirements.txt
          mkdir -p /tmp/test_timeseries_core_report
          rm -f /tmp/test_timeseries_core_report/report.html /tmp/test_timeseries_core_report/junit.xml

          # Build marker expression to skip long-running tests when requested
          MARKER_ARGS=()
          if [[ "$SKIP_LONG_TESTS" == "yes" ]]; then
            echo "Skipping long-running tests (marked with @pytest.mark.longrun)"
            MARKER_ARGS=(-m "not longrun")
          fi

          # When running the full suite, ignore GPU tests (require GPU-capable runners).
          # GPU test files remain individually selectable via the `tests` input.
          IGNORE_ARGS=()
          if [[ "$RUN_ALL_TS" == "true" ]]; then
            IGNORE_ARGS=(
              --ignore=test_GPU_docker.py
              --ignore=test_GPU_helm.py
            )
          fi

          # List tests that will be collected (helps debug which tests run/are skipped)
          echo ""
          echo "========== Collecting time-series core tests =========="
          if [[ "$RUN_ALL_TS" == "true" ]]; then
            pytest --collect-only -q "${MARKER_ARGS[@]}" "${IGNORE_ARGS[@]}" 2>&1 || true
          else
            pytest --collect-only -q "${MARKER_ARGS[@]}" "${TS_CORE_TEST_FILES[@]}" 2>&1 || true
          fi
          echo "======================================"
          echo ""

          # Run selected tests (all or specific files)
          set +e
          if [[ "$RUN_ALL_TS" == "true" ]]; then
            pytest -vv --tb=short --self-contained-html --html=/tmp/test_timeseries_core_report/report.html \
              --junitxml=/tmp/test_timeseries_core_report/junit.xml "${MARKER_ARGS[@]}" "${IGNORE_ARGS[@]}" \
              --ignore=test_docker_helm_deployment_security.py
          else
            pytest -vv --tb=short --self-contained-html --html=/tmp/test_timeseries_core_report/report.html \
              --junitxml=/tmp/test_timeseries_core_report/junit.xml "${MARKER_ARGS[@]}" "${TS_CORE_TEST_FILES[@]}"
          fi
          PYTEST_RC=$?
          set -e
          echo "TIMESERIES_CORE_EXIT_CODE=$PYTEST_RC" >> "$GITHUB_ENV"

          if [[ "$PYTEST_RC" -ne 0 ]]; then
            echo ""
            echo "========== Time Series Core Failure Diagnostics =========="
            echo "Kubernetes nodes:"
            kubectl get nodes -o wide 2>&1 || true
            echo ""
            echo "All pods:"
            kubectl get pods -A -o wide 2>&1 || true
            echo ""
            echo "Time-series namespace resources (ts-sample-app):"
            kubectl get all -n ts-sample-app -o wide 2>&1 || true
            echo ""
            echo "Time-series namespace pod descriptions:"
            kubectl describe pods -n ts-sample-app 2>&1 || true
            echo ""
            echo "Time-series namespace recent events:"
            kubectl get events -n ts-sample-app --sort-by=.lastTimestamp 2>&1 || true
            echo ""
            echo "Time-series namespace current pod logs:"
            for deploy in \
              deployment-time-series-analytics-microservice \
              deployment-telegraf \
              deployment-influxdb \
              deployment-nginx \
              deployment-mqtt-publisher \
              deployment-mqtt-broker \
              deployment-opcua-server \
              deployment-grafana; do
              echo "----- Logs for ${deploy} -----"
              kubectl logs -n ts-sample-app --all-containers=true --prefix=true --tail=200 "deployment/${deploy}" 2>&1 || true
            done
            echo ""
            echo "Pytest-generated tests.log (if present):"
            find . -maxdepth 3 -name tests.log -type f -print -exec tail -n 400 {} \; 2>&1 || true
            echo "===================================================="
            echo ""
          fi

          # Print test results summary with failure details
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET, os
          from collections import defaultdict
          def fmt_time(s):
              s = float(s); m = int(s) // 60; r = s - m * 60
              return f"{m}m{r:.0f}s" if m else f"{s:.1f}s"
          xml_path = '/tmp/test_timeseries_core_report/junit.xml'
          if not os.path.exists(xml_path):
              print("No test results found (JUnit XML not generated)")
          else:
              root = ET.parse(xml_path).getroot()
              files = defaultdict(lambda: {'total': 0, 'passed': 0, 'failed': 0, 'skipped': 0, 'errors': 0, 'time': 0.0})
              failures = []
              errors = []
              for tc in root.findall('.//testcase'):
                  parts = tc.get('classname', '').split('.')
                  fname = next((p for p in parts if p.startswith('test_')), None)
                  if not fname:
                      raw_name = tc.get('name', parts[0] if parts else 'unknown')
                      fname = raw_name.replace('.py', '') if raw_name else 'unknown'
                  test_id = f"{fname}::{tc.get('name', 'unknown')}"
                  files[fname]['total'] += 1
                  files[fname]['time'] += float(tc.get('time', 0))
                  fail_el = tc.find('failure')
                  err_el = tc.find('error')
                  if fail_el is not None:
                      files[fname]['failed'] += 1
                      msg = fail_el.get('message', '')[:200]
                      failures.append(f"  FAILED  {test_id}\n          {msg}")
                  elif err_el is not None:
                      files[fname]['errors'] += 1
                      msg = err_el.get('message', '')[:200]
                      errors.append(f"  ERROR   {test_id}\n          {msg}")
                  elif tc.find('skipped') is not None:
                      files[fname]['skipped'] += 1
                  else:
                      files[fname]['passed'] += 1
              print(f"\n{'Test File':<55} {'Run':>5} {'Pass':>5} {'Fail':>5} {'Skip':>5} {'Err':>5} {'Time':>8}")
              print('-' * 90)
              for fname, c in sorted(files.items()):
                  print(f"{fname:<55} {c['total']:>5} {c['passed']:>5} {c['failed']:>5} {c['skipped']:>5} {c['errors']:>5} {fmt_time(c['time']):>8}")
              if failures:
                  print(f"\n--- Failures ({len(failures)}) ---")
                  print('\n'.join(failures))
              if errors:
                  print(f"\n--- Errors ({len(errors)}) ---")
                  print('\n'.join(errors))
              print()
          PYEOF
          deactivate
          exit $PYTEST_RC

      - name: Upload Time Series Wind and Weld HTML test report to GitHub
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: timeseries-core-test-report
          path: /tmp/test_timeseries_core_report

      - name: Cleanup cluster before security tests
        if: ${{ !cancelled() }}
        run: |
          echo "=== Cleaning up cluster resources before security tests ==="

          echo "Uninstalling all Helm releases..."
          helm list --all-namespaces -q 2>/dev/null | while read release; do
            ns=$(helm list --all-namespaces --filter "^${release}$" -o json 2>/dev/null | jq -r '.[0].namespace // "default"')
            echo "Uninstalling helm release: $release from namespace: $ns"
            helm uninstall "$release" -n "$ns" --wait --timeout 5m 2>/dev/null || true
          done

          echo "Cleaning up security test namespace..."
          if kubectl get namespace ts-sample-app 2>/dev/null; then
            kubectl delete namespace ts-sample-app --wait=true --timeout=5m 2>/dev/null || true
          fi

          echo "Cleaning up namespace-scoped test resources..."
          if kubectl get namespace ts-sample-app 2>/dev/null; then
            kubectl delete pvc --all -n ts-sample-app --wait=true --timeout=5m 2>/dev/null || true
            kubectl wait --for=delete pod --all -n ts-sample-app --timeout=5m 2>/dev/null || true
            kubectl get pods -n ts-sample-app -o name 2>/dev/null | while read pod; do
              kubectl delete "$pod" -n ts-sample-app --force --grace-period=0 2>/dev/null || true
            done
          fi

          echo "Cleaning up docker resources..."
          cd "${{ github.workspace }}/manufacturing-ai-suite/industrial-edge-insights-time-series/"
          make down 2>/dev/null || true

          echo "Waiting for cluster to stabilize..."
          sleep 30

          echo "Verifying cluster health..."
          kubectl get nodes
          kubectl get pods -A
          echo "=== Security cleanup complete ==="

      - name: Run Security functional tests
        if: ${{ !cancelled() }}
        env:
          TESTS: ${{ inputs.tests || env.DEFAULT_TESTS }}
          SKIP_LONG_TESTS: ${{ inputs.skip_long_tests || 'yes' }}
        run: |
          SECURITY_TEST_FILE="test_docker_helm_deployment_security"

          IFS=',' read -ra SELECTED <<< "$TESTS"
          SECURITY_TEST_FILES=()
          RUN_SECURITY=false
          for t in "${SELECTED[@]}"; do
            t="$(echo "$t" | xargs)"
            [[ -z "$t" ]] && continue
            if [[ "$t" == "all-tests" || "$t" == "timeseries-all" ]]; then
              RUN_SECURITY=true
              break
            fi
            file_part="${t%%::*}"
            file_part="${file_part%.py}"
            if [[ "$file_part" == "$SECURITY_TEST_FILE" ]]; then
              if [[ "$t" == *"::"* ]]; then
                SECURITY_TEST_FILES+=("${file_part}.py::${t#*::}")
              else
                SECURITY_TEST_FILES+=("${file_part}.py")
              fi
            fi
          done

          if [[ "$RUN_SECURITY" == "false" && "${#SECURITY_TEST_FILES[@]}" -eq 0 ]]; then
            echo "Skipping security tests (no security tests selected)"
            exit 0
          fi

          cd "${{ github.workspace }}/manufacturing-ai-suite/industrial-edge-insights-time-series/tests/functional"
          echo "Running Security functional tests"
          python3 -m venv env
          source env/bin/activate
          pip3 install -r ../requirements.txt
          mkdir -p /tmp/test_timeseries_security_report
          rm -f /tmp/test_timeseries_security_report/report.html /tmp/test_timeseries_security_report/junit.xml

          MARKER_ARGS=()
          if [[ "$SKIP_LONG_TESTS" == "yes" ]]; then
            echo "Skipping long-running tests (marked with @pytest.mark.longrun)"
            MARKER_ARGS=(-m "not longrun")
          fi

          echo ""
          echo "========== Collecting security tests =========="
          if [[ "$RUN_SECURITY" == "true" ]]; then
            pytest --collect-only -q "${MARKER_ARGS[@]}" test_docker_helm_deployment_security.py 2>&1 || true
          else
            pytest --collect-only -q "${MARKER_ARGS[@]}" "${SECURITY_TEST_FILES[@]}" 2>&1 || true
          fi
          echo "==========================================="
          echo ""

          set +e
          if [[ "$RUN_SECURITY" == "true" ]]; then
            pytest -vv --tb=short --self-contained-html --html=/tmp/test_timeseries_security_report/report.html \
              --junitxml=/tmp/test_timeseries_security_report/junit.xml "${MARKER_ARGS[@]}" test_docker_helm_deployment_security.py
          else
            pytest -vv --tb=short --self-contained-html --html=/tmp/test_timeseries_security_report/report.html \
              --junitxml=/tmp/test_timeseries_security_report/junit.xml "${MARKER_ARGS[@]}" "${SECURITY_TEST_FILES[@]}"
          fi
          PYTEST_RC=$?
          set -e
          echo "TIMESERIES_SECURITY_EXIT_CODE=$PYTEST_RC" >> "$GITHUB_ENV"

          if [[ "$PYTEST_RC" -ne 0 ]]; then
            echo ""
            echo "========== Security Failure Diagnostics =========="
            echo "Kubernetes nodes:"
            kubectl get nodes -o wide 2>&1 || true
            echo ""
            echo "All pods:"
