      - name: Cleanup cluster before multimodal tests
        if: ${{ !cancelled() }}
        run: |
          echo "=== Cleaning up cluster resources before multimodal tests ==="

          # Uninstall all helm releases in default namespace
          echo "Uninstalling all Helm releases..."
          helm list --all-namespaces -q 2>/dev/null | while read release; do
            ns=$(helm list --all-namespaces --filter "^${release}$" -o json 2>/dev/null | jq -r '.[0].namespace // "default"')
            echo "Uninstalling helm release: $release from namespace: $ns"
            helm uninstall "$release" -n "$ns" --wait --timeout 5m 2>/dev/null || true
          done

          # Delete test-related namespaces (if any were created)
          echo "Cleaning up test namespaces..."
          kubectl get namespaces -o name 2>/dev/null | grep -E "(weld|wind|timeseries|multimodal)" | while read ns; do
            echo "Deleting namespace: $ns"
            kubectl delete "$ns" --wait=true --timeout=5m 2>/dev/null || true
          done

          # Clean up sample-app namespaces
          echo "Cleaning up namespace-scoped test resources..."
          for ns in ts-sample-app weld wind timeseries multimodal; do
            if kubectl get namespace "$ns" 2>/dev/null; then
              kubectl delete pvc --all -n "$ns" --wait=true --timeout=5m 2>/dev/null || true
              kubectl wait --for=delete pod --all -n "$ns" --timeout=5m 2>/dev/null || true
              kubectl get pods -n "$ns" -o name 2>/dev/null | while read pod; do
                kubectl delete "$pod" -n "$ns" --force --grace-period=0 2>/dev/null || true
              done
            fi
          done

          # Clean up any leftover docker resources from prior segments
          echo "Cleaning up docker resources..."
          cd "${{ github.workspace }}/manufacturing-ai-suite/industrial-edge-insights-time-series/"
          make down 2>/dev/null || true
          cd "${{ github.workspace }}/manufacturing-ai-suite/industrial-edge-insights-multimodal/"
          make down 2>/dev/null || true

          # Give cluster time to stabilize
          echo "Waiting for cluster to stabilize..."
          sleep 30

          # Verify cluster is healthy
          echo "Verifying cluster health..."
          kubectl get nodes
          kubectl get pods -A
          echo "=== Multimodal cleanup complete ==="

      - name: Run Multimodal Weld Defect Detection Sample Apps functional tests
        if: ${{ !cancelled() }}
        env:
          TESTS: ${{ inputs.tests || env.DEFAULT_TESTS }}
          SKIP_LONG_TESTS: ${{ inputs.skip_long_tests || 'yes' }}
        run: |
          # Multimodal-specific test files
          MULTIMODAL_TESTS="test_docker_deployment_multimodal test_helm_deployment_multimodal"

          # Skip if only timeseries tests are selected
          # Parse comma-separated input, trim whitespace from each entry
          IFS=',' read -ra SELECTED <<< "$TESTS"
          SELECTED_TESTS=()
          for t in "${SELECTED[@]}"; do
            t="$(echo "$t" | xargs)"
            [[ -n "$t" ]] && SELECTED_TESTS+=("$t")
          done

          # Determine which multimodal test files to run
          # Supports file names (test_foo), file names with .py, and node IDs (test_foo::test_bar)
          MM_TEST_FILES=()
          RUN_ALL_MM=false
          for t in "${SELECTED_TESTS[@]}"; do
            if [[ "$t" == "all-tests" || "$t" == "multimodal-all" ]]; then
              RUN_ALL_MM=true; break
            fi
            # Extract base file name (strip .py suffix and anything after ::)
            file_part="${t%%::*}"
            file_part="${file_part%.py}"
            if echo "$MULTIMODAL_TESTS" | grep -qw "$file_part"; then
              if [[ "$t" == *"::"* ]]; then
                MM_TEST_FILES+=("${file_part}.py::${t#*::}")
              else
                MM_TEST_FILES+=("${file_part}.py")
              fi
            fi
          done

          if [[ "$RUN_ALL_MM" == "false" && "${#MM_TEST_FILES[@]}" -eq 0 ]]; then
            echo "Skipping multimodal tests (no multimodal tests selected)"
            exit 0
          fi

          cd "${{ github.workspace }}/manufacturing-ai-suite/industrial-edge-insights-multimodal/tests/functional"
          echo "Running Multimodal Weld Defect Detection Sample Apps functional tests"
          python3 -m venv env
          source env/bin/activate
          pip3 install -r ../requirements.txt
          mkdir -p /tmp/test_multimodal_report
          rm -f /tmp/test_multimodal_report/report.html /tmp/test_multimodal_report/junit.xml

          # Build marker expression to skip long-running tests when requested
          MARKER_ARGS=()
          if [[ "$SKIP_LONG_TESTS" == "yes" ]]; then
            echo "Skipping long-running tests (marked with @pytest.mark.longrun)"
            MARKER_ARGS=(-m "not longrun")
          fi

          # List tests that will be collected (helps debug which tests run/are skipped)
          echo ""
          echo "========== Collecting tests =========="
          if [[ "$RUN_ALL_MM" == "true" ]]; then
            pytest --collect-only -q "${MARKER_ARGS[@]}" 2>&1 || true
          else
            pytest --collect-only -q "${MARKER_ARGS[@]}" "${MM_TEST_FILES[@]}" 2>&1 || true
          fi
          echo "======================================"
          echo ""

          # Run selected tests (all or specific files)
          set +e
          if [[ "$RUN_ALL_MM" == "true" ]]; then
            pytest -vv --tb=short --self-contained-html --html=/tmp/test_multimodal_report/report.html \
              --junitxml=/tmp/test_multimodal_report/junit.xml "${MARKER_ARGS[@]}"
          else
            pytest -vv --tb=short --self-contained-html --html=/tmp/test_multimodal_report/report.html \
              --junitxml=/tmp/test_multimodal_report/junit.xml "${MARKER_ARGS[@]}" "${MM_TEST_FILES[@]}"
          fi
          PYTEST_RC=$?
          set -e
          echo "MULTIMODAL_EXIT_CODE=$PYTEST_RC" >> "$GITHUB_ENV"

          # Print test results summary with failure details
          python3 - <<'PYEOF'
