<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Caption Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>
    <header class="topbar">
        <h2>
            <svg class="cc-icon" viewBox="0 0 24 24" width="28" height="28" aria-hidden="true" focusable="false">
                <rect x="2" y="4" width="20" height="16" rx="3" ry="3" fill="none" stroke="currentColor"
                    stroke-width="2" />
                <text x="6" y="15.5" font-size="8" font-weight="bold" fill="currentColor">CC</text>
            </svg>
            <span id="appTitle">Live Video Captioning</span>
        </h2>
        <div class="header-buttons">
            <button id="chatToggle" class="icon-button tooltip-btn" type="button" aria-label="Open chat"
                data-tooltip="Redirect to RAG Chatbot">
                <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" focusable="false">
                    <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" stroke="currentColor"
                        stroke-width="1.5" fill="none" />
                </svg>
            </button>
            <button id="themeToggle" class="icon-button" type="button" aria-label="Switch theme">
                <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2" fill="none" />
                    <line x1="12" y1="2" x2="12" y2="5" stroke="currentColor" stroke-width="2" />
                    <line x1="12" y1="19" x2="12" y2="22" stroke="currentColor" stroke-width="2" />
                    <line x1="4.22" y1="4.22" x2="6.34" y2="6.34" stroke="currentColor" stroke-width="2" />
                    <line x1="17.66" y1="17.66" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="2" />
                    <line x1="2" y1="12" x2="5" y2="12" stroke="currentColor" stroke-width="2" />
                    <line x1="19" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="2" />
                    <line x1="4.22" y1="19.78" x2="6.34" y2="17.66" stroke="currentColor" stroke-width="2" />
                    <line x1="17.66" y1="6.34" x2="19.78" y2="4.22" stroke="currentColor" stroke-width="2" />
                </svg>
                <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M21 12.8A9 9 0 0 1 11.2 3 7.5 7.5 0 1 0 21 12.8Z" stroke="currentColor" stroke-width="2"
                        fill="none" />
                </svg>
            </button>
        </div>
    </header>
    <main>
        <div id="pipelineServerError" class="pipeline-error-banner" style="display:none;"></div>
        <section class="panels">
            <article class="card">
                <form id="pipelineForm" class="controls">
                    <label class="field">
                        <span class="label">Stream Source Type</span>
                        <select id="streamSourceTypeSelect" class="input">
                            <option value="rtsp" selected>RTSP Stream</option>
                        </select>
                    </label>
                    <label class="field" id="cameraDeviceRow">
                        <span class="label">Select Camera Device</span>
                        <select id="cameraDeviceSelect" class="input"></select>
                        <span id="cameraDeviceWarning" class="stream-source-warning" style="display:none;">
                            No usable camera devices detected. Connect a camera or switch to RTSP Stream.
                        </span>
                    </label>
                    <label class="field" id="rtspInputRow" style="display:none;">
                        <span class="label">Enter RTSP Stream</span>
                        <input id="rtspInput" class="input" type="text"
                            placeholder="Enter RTSP URL (e.g., rtsp://...)" />
                    </label>
                    <label class="field">
                        <span class="label">Enter Prompt</span>
                        <textarea id="promptInput" class="input textarea"
                            rows="2">Describe what you see in one sentence.</textarea>
                    </label>
                    <div class="field-row">
                        <label class="field">
                            <span class="label" title="Choose the pipeline variant.">Select Pipeline</span>
                            <select id="pipelineTypeSelect" class="input" title="Choose the pipeline variant.">
                                <option value="non-detection" selected>Video Captioning Pipeline</option>
                                <option value="detection">Video Captioning Pipeline with Detection</option>
                            </select>
                        </label>
                        <label class="field">
                            <span class="label"
                                title="Select where the vision-language model runs for caption generation. CPU works on most systems. GPU requires a compatible GPU. NPU requires a supported NPU.">VLM
                                Device</span>
                            <select id="vlmDeviceSelect" class="input"
                                title="Select where the vision-language model runs for caption generation. CPU works on most systems. GPU requires a compatible GPU. NPU requires a supported NPU.">
                                <option value="cpu" selected>CPU</option>
                                <option value="gpu">GPU</option>
                                <option value="npu">NPU</option>
                            </select>
                        </label>
                    </div>
                    <div class="field-row">
                        <label class="field">
                            <span class="label">Select Model
                                <span id="modelCompatibilityWarningIcon"
                                    class="inline-warning-tooltip critical-warning-tooltip" style="display:none;"
                                    tabindex="0" role="img" aria-label="Model compatibility warning" title=""
                                    data-tooltip="">
                                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                        <path d="M12 3L2.8 19.5A1.2 1.2 0 0 0 3.8 21h16.4a1.2 1.2 0 0 0 1-1.5L12 3z"
                                            fill="none" stroke="currentColor" stroke-width="1.8" />
                                        <line x1="12" y1="9" x2="12" y2="14" stroke="currentColor" stroke-width="1.8"
                                            stroke-linecap="round" />
                                        <circle cx="12" cy="17" r="1.1" fill="currentColor" />
                                    </svg>
                                </span>
                            </span>
                            <select id="modelNameSelect" class="input"></select>
                        </label>
                        <label class="field">
                            <span class="label">Max New Tokens</span>
                            <input id="maxTokensInput" class="input" type="number" min="1" max="4096" value="70" />
                        </label>
                    </div>
                    <div class="field-row">
                        <label class="field">
                            <span class="label">Frame Rate</span>
                            <input id="frameRateInput" class="input" type="number" min="0" step="1" value="1" />
                        </label>
                        <label class="field">
                            <span class="label">Chunk Size</span>
                            <input id="chunkSizeInput" class="input" type="number" min="1" step="1" value="1" />
                        </label>
                        <label class="field">
                            <span class="label">Caption History</span>
                            <input id="captionHistoryInput" class="input" type="number" min="0" step="1" value="3" />
                        </label>
                    </div>
                    <div class="field-row">
                        <label class="field">
                            <span class="label">Frame Resolution</span>
                            <select id="frameQualitySelect" class="input">
                                <option value="default" selected>Default</option>
                                <option value="1280x720">1280 × 720</option>
                                <option value="640x480">640 × 480</option>
                                <option value="480x360">480 × 360</option>
                                <option value="custom">Custom</option>
                            </select>
                        </label>
                    </div>
                    <div class="field-row" id="customDimensionsRow" style="display: none;">
                        <label class="field">
                            <span class="label">Custom Width (px)</span>
                            <input id="customWidthInput" class="input" type="number" min="1" step="1"
                                placeholder="e.g. 1920" />
                        </label>
                        <label class="field">
                            <span class="label">Custom Height (px)</span>
                            <input id="customHeightInput" class="input" type="number" min="1" step="1"
                                placeholder="e.g. 1080" />
                        </label>
                    </div>
                    <div class="field-row">
                        <label class="field">
                            <span class="label">Run Name</span>
                            <input id="runNameInput" class="input" type="text"
                                placeholder="Enter Run Name (Optional)" />
                        </label>
                    </div>
                    <div id="detectionSection" class="field-group" style="display: none;">
                        <div class="field">
                            <span class="label">
                                <label class="text-label">Detection Properties
                                    <span class="inline-help-tooltip" tabindex="0" role="img"
                                        aria-label="Detection properties help"
                                        data-tooltip="These detection properties configure the selected YOLO detection model to detect labels that the selected model was trained on. Detection Device selects the hardware (CPU/GPU/NPU) used for detection, and Detection Threshold sets the minimum confidence score for showing detections.">?</span>
                                </label>
                            </span>
                        </div>
                        <div class="field-row">
                            <label class="checkbox-field" id="roiBoundingBoxField"
                                title="Enable ROI/object bounding box overlay on output frame. Uncheck to hide bounding boxes.">
                                <input id="includeRoiBoundingBoxCheckbox" type="checkbox" />
                                <span class="label">Include ROI Bounding Box</span>
                            </label>
                        </div>
                        <div class="field-row">
                            <label class="field" id="detectionModelField">
                                <span class="label">Detection Model
                                    <span id="detectionModelCompatibilityWarningIcon"
                                        class="inline-warning-tooltip critical-warning-tooltip" style="display:none;"
                                        tabindex="0" role="img" aria-label="Detection model compatibility warning"
                                        title="" data-tooltip="">
                                        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                            <path d="M12 3L2.8 19.5A1.2 1.2 0 0 0 3.8 21h16.4a1.2 1.2 0 0 0 1-1.5L12 3z"
                                                fill="none" stroke="currentColor" stroke-width="1.8" />
                                            <line x1="12" y1="9" x2="12" y2="14" stroke="currentColor"
                                                stroke-width="1.8" stroke-linecap="round" />
                                            <circle cx="12" cy="17" r="1.1" fill="currentColor" />
                                        </svg>
                                    </span>
                                </span>
                                <select id="detectionModelNameSelect" class="input"></select>
                            </label>
                            <label class="field" id="detectionDeviceField">
                                <span class="label">Detection Device</span>
                                <select id="detectionDeviceSelect" class="input"
                                    title="Select where gvadetect runs. Software detection pipelines use SYSTEM memory and support CPU only. Hardware detection pipelines use VAMemory, so only GPU/NPU are supported.">
                                    <option value="cpu" selected>CPU</option>
                                    <option value="gpu">GPU</option>
                                    <option value="npu">NPU</option>
                                </select>
                            </label>
                            <label class="field" id="detectionThresholdField">
                                <span class="label">Detection Threshold</span>
                                <input id="detectionThresholdInput" class="input" type="number" min="0" max="1"
                                    step="0.1" value="0.5" />
                            </label>
                        </div>
                    </div>

                    <div id="alertRulesSection" class="field-group" style="display: none;">
                        <div class="alert-rules-box">
                            <div class="alert-rules-box-header">
                                🔔 Alert Rules
                            </div>
                            <div id="alertRulesList"></div>
                            <button id="addAlertRuleBtn" type="button" class="btn btn-secondary btn-sm">+ Add
                                Rule</button>
                        </div>
                    </div>
                    <div class="field-row" style="justify-content: space-between; align-items: center;">
                        <div class="status" style="margin: 0; flex-shrink: 0;">
                            <span class="dot active"></span>
                            <span id="pipelineInfo">Pipeline idle</span>
                        </div>
                        <div class="status" style="margin: 0; flex-shrink: 0; font-size: 0.85rem;">
                            <span class="dot" id="collectorStatusDot"></span>
                            <span>Collector: <span id="collectorStatus"
                                    class="status-disconnected">Disconnected</span></span>
                        </div>
                        <button id="startBtn" class="btn btn-primary" type="submit">Start</button>
                    </div>
                </form>
                <div class="card system-stats-card" style="margin-top:2px; background: var(--panel-strong);">
                    <div class="chart-card">
                        <div class="chart-header">
                            <span>System Metrics</span>
                            <div class="chart-values">
                                <span class="chart-value" style="color:#1ad0ff">CPU <span id="cpuVal">—</span></span>
                                <span class="chart-value gpu-values" id="gpuValues" style="display:none;"></span>
                                <span class="chart-value" id="npuStat" style="color:#b388ff; display:none;">NPU <span
                                        id="npuVal">—</span></span>
                                <span class="chart-value" style="color:#8ca0c2">RAM <span id="ramVal">—</span></span>
                            </div>
                        </div>
                        <div class="gpu-error" id="gpuError"
                            style="font-size: 0.7rem; color: var(--text-muted); display: none;"></div>
                        <div class="chart-wrap"><canvas id="statsChart"></canvas></div>
                    </div>
                </div>
            </article>
            <article class="card live-layout">
                <div id="runsContainer"></div>
                <div class="empty-alert" id="hint">Start a pipeline to see video streams here</div>
            </article>
        </section>
    </main>
    <script src="/js/vendor/chart.js"></script>
    <script src="/runtime-config.js"></script>
    <script src="/js/utils/theme.js"></script>
    <script src="/js/utils/settings.js"></script>
    <script src="/js/utils/charts.js"></script>
    <script src="/js/services/api.js"></script>
    <script src="/js/services/metadata-stream.js"></script>
    <script src="/js/services/metrics-collector.js"></script>
    <script src="/js/components/run-card.js"></script>
    <script src="/js/app.js"></script>

</body>

</html>
